server {
    listen 80;
    server_name _;

    # Redirect HTTP → HTTPS (schakel uit als je geen SSL gebruikt)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name glavo.example.com;  # ← pas aan naar je eigen domein

    ssl_certificate     /etc/letsencrypt/live/glavo.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glavo.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 50M;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   app:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ /\.ht {
        deny all;
    }
}

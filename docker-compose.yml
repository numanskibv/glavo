services:
  # ── Nginx (HTTP only — SSL via Nginx Proxy Manager) ─────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: glavo_nginx
    restart: unless-stopped
    ports:
      - "78:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - public_build:/var/www/html/public/build:ro
      - storage_data:/var/www/html/storage:ro
    depends_on:
      - app
    networks:
      - glavo
      - npm_proxy # gedeeld netwerk met Nginx Proxy Manager

  # ── PHP-FPM app ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glavo_app
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - storage_data:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      - public_build:/var/www/html/public/build
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - glavo

  # ── Queue worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glavo_worker
    restart: unless-stopped
    command:
      [
        "php",
        "artisan",
        "queue:work",
        "--sleep=3",
        "--tries=3",
        "--max-time=3600",
      ]
    env_file: .env.production
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - glavo

  # ── MySQL ──────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    container_name: glavo_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-glavo}
      MYSQL_USER: ${DB_USERNAME:-glavo}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - glavo

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: glavo_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - glavo

volumes:
  db_data:
  redis_data:
  storage_data:
  public_build:

networks:
  glavo:
    driver: bridge
  npm_proxy:
    external: true # aangemaakt door de Nginx Proxy Manager stack
